# ============================================================
# MuJoCo 仿真参数配置文件
# ============================================================
# 版本: 1.0
# 描述: UIKA 四足机器人仿真参数
# ============================================================

mujoco_sim_node:
  ros__parameters:

    # ============================================================
    # 模型配置
    # ============================================================
    # MJCF 模型文件路径（相对于包的 mjcf 目录）
    model_path: "mjcf/uika.xml"

    # 仿真频率 (Hz)
    hz: 1000.0

    # 是否显示 MuJoCo 可视化窗口
    # true: 显示交互式窗口（可暂停、查看数据）
    # false: 无窗口，以最快速度运行
    use_viewer: true

    # 实时因子
    # 1.0: 实时仿真（1秒仿真时间 = 1秒墙钟时间）
    # 0.0: 最快速度（忽略实时性）
    # 例如: 2.0 表示 2倍速仿真
    real_time_factor: 1.0

    # ============================================================
    # 关节配置
    # ============================================================
    # 关节名称列表（12 个驱动关节）
    # 顺序必须与 URDF/MJCF 一致
    joint_names:
      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint
      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint
      - BL_hip_joint
      - BL_thigh_joint
      - BL_calf_joint
      - BR_hip_joint
      - BR_thigh_joint
      - BR_calf_joint

    # ============================================================
    # IMU 配置
    # ============================================================
    # IMU 数据帧 ID
    imu_frame_id: "base_imu"

    # IMU 在基座坐标系中的位置
    imu_position: [0.0, 0.0, 0.0]

    # ============================================================
    # 传感器噪声配置（可选）
    # ============================================================
    # 是否添加传感器噪声
    # true: 添加高斯噪声模拟真实传感器
    # false: 原始仿真数据
    add_sensor_noise: false

    # 关节位置噪声标准差 (rad)
    # 仅在 add_sensor_noise=true 时生效
    position_noise_std: 0.001

    # 关节速度噪声标准差 (rad/s)
    velocity_noise_std: 0.01

    # IMU 加速度计噪声标准差 (m/s^2)
    imu_acc_noise_std: 0.1

    # IMU 陀螺仪噪声标准差 (rad/s)
    imu_gyro_noise_std: 0.01

    # ============================================================
    # 物理参数（可选，用于调试）
    # ============================================================
    # 重力加速度 (m/s^2)
    gravity: 9.81

    # 地面摩擦系数
    ground_friction: 0.5

    # ============================================================
    # 调试输出配置
    # ============================================================
    # 打印仿真频率统计
    print_frequency_stats: true

    # 打印接触力信息
    print_contact_forces: false
